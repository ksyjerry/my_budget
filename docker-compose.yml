services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mybudget
      POSTGRES_USER: mybudget
      POSTGRES_PASSWORD: mybudget
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - postgres
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "8001:8001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run build && npm run start"

volumes:
  pgdata:
