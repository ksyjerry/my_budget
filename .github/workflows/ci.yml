name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  grep-guards:
    name: Grep Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci/check-no-direct-number-input.sh
      - run: bash scripts/ci/check-no-direct-budget-arithmetic.sh
      - run: bash scripts/ci/check-docker-compose-no-dev.sh

  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mybudget_test
          POSTGRES_USER: mybudget
          POSTGRES_PASSWORD: mybudget
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mybudget"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mybudget:mybudget@localhost:5432/mybudget_test
      AZURE_SQL_HOST: mock
      AZURE_SQL_DB: mock
      AZURE_SQL_USER: mock
      AZURE_SQL_PASSWORD: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest
      - run: cd backend && alembic upgrade head
      - run: cd backend && pytest

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build
      # NOTE: Playwright integration/regression/visual/smoke 테스트는 별도 backend
      # 서비스가 필요하므로 PR 리뷰 시 staging 환경에서 manual QA 로 검증.
      # 추후 docker-compose 기반 통합 CI 구성 시 재활성화.
